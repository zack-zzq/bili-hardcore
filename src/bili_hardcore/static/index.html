<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bili-Hardcore | B站硬核会员自动答题</title>
    <meta name="description" content="B站硬核会员自动答题工具 WebUI 版，使用 AI 大模型智能答题">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- ==================== 登录页 ==================== -->
    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="login-card glass-card">
                <div class="login-header">
                    <div class="logo-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="10" width="40" height="28" rx="6" stroke="currentColor" stroke-width="3"/>
                            <path d="M16 6L12 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <path d="M32 6L36 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="18" cy="22" r="2.5" fill="currentColor"/>
                            <circle cx="30" cy="22" r="2.5" fill="currentColor"/>
                            <path d="M18 30C18 30 21 33 24 33C27 33 30 30 30 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1>Bili-Hardcore</h1>
                    <p class="subtitle">B站硬核会员自动答题</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                        <span>登 录</span>
                    </button>
                    <p id="login-error" class="error-text"></p>
                </form>
            </div>
        </div>
    </div>

    <!-- ==================== 主界面 ==================== -->
    <div id="main-page" class="page">
        <!-- 顶部导航 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <div class="logo-small">
                    <svg viewBox="0 0 48 48" fill="none"><rect x="4" y="10" width="40" height="28" rx="6" stroke="currentColor" stroke-width="3"/><path d="M16 6L12 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M32 6L36 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><circle cx="18" cy="22" r="2.5" fill="currentColor"/><circle cx="30" cy="22" r="2.5" fill="currentColor"/></svg>
                </div>
                <span class="brand-name">Bili-Hardcore</span>
            </div>
            <div class="top-bar-right">
                <button class="btn btn-ghost" id="settings-btn" title="设置">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <span>设置</span>
                </button>
                <button class="btn btn-accent" id="new-task-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>新建任务</span>
                </button>
                <button class="btn btn-ghost" id="logout-btn" title="退出">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="main-layout">
            <!-- 侧边栏 - 任务列表 -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>任务列表</h2>
                    <span class="task-count" id="task-count">0</span>
                </div>
                <div class="task-list" id="task-list">
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="content" id="content">
                <!-- 欢迎页面（无任务选中时显示） -->
                <div class="welcome-panel" id="welcome-panel">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 48 48" fill="none"><rect x="4" y="10" width="40" height="28" rx="6" stroke="currentColor" stroke-width="2"/><path d="M16 6L12 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M32 6L36 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="18" cy="22" r="2.5" fill="currentColor"/><circle cx="30" cy="22" r="2.5" fill="currentColor"/><path d="M18 30C18 30 21 33 24 33C27 33 30 30 30 30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                    <h2>欢迎使用 Bili-Hardcore</h2>
                    <p>点击右上角「新建任务」开始自动答题</p>
                </div>

                <!-- 任务详情面板 -->
                <div class="task-panel" id="task-panel" style="display:none">
                    <!-- 任务头部 -->
                    <div class="task-header">
                        <div class="task-meta">
                            <h2 id="task-title">任务</h2>
                            <div class="task-badges">
                                <span class="badge" id="task-state-badge">等待中</span>
                                <span class="badge badge-outline" id="task-user-badge" style="display:none"></span>
                            </div>
                        </div>
                        <div class="task-stats">
                            <div class="stat-item">
                                <span class="stat-value" id="task-progress">0/100</span>
                                <span class="stat-label">进度</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value" id="task-score">0</span>
                                <span class="stat-label">得分</span>
                            </div>
                        </div>
                    </div>

                    <!-- 进度条 -->
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="task-progress-bar" style="width:0%"></div>
                    </div>

                    <!-- 交互区域 -->
                    <div class="interaction-area" id="interaction-area">
                        <!-- 二维码区域 -->
                        <div class="interaction-card qr-card" id="qr-section" style="display:none">
                            <h3>📱 扫码登录</h3>
                            <p>请使用哔哩哔哩APP扫描下方二维码</p>
                            <div class="qr-wrapper">
                                <div id="qr-canvas-container"></div>
                            </div>
                            <button class="btn btn-outline btn-sm" id="qr-download-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                下载二维码
                            </button>
                        </div>

                        <!-- 分类选择区域 -->
                        <div class="interaction-card" id="category-section" style="display:none">
                            <h3>📂 选择答题分类</h3>
                            <p>最多选择3个分类</p>
                            <div class="category-grid" id="category-grid"></div>
                            <button class="btn btn-primary" id="category-submit-btn">确认选择</button>
                        </div>

                        <!-- 验证码区域 -->
                        <div class="interaction-card" id="captcha-section" style="display:none">
                            <h3>🔐 输入验证码</h3>
                            <div class="captcha-display">
                                <img id="captcha-image" alt="验证码" />
                            </div>
                            <div class="captcha-input-row">
                                <input type="text" id="captcha-input" placeholder="请输入验证码" maxlength="6" autocomplete="off">
                                <button class="btn btn-primary" id="captcha-submit-btn">提交</button>
                            </div>
                        </div>
                    </div>

                    <!-- 日志区域 -->
                    <div class="log-section">
                        <div class="log-header">
                            <h3>📋 实时日志</h3>
                            <button class="btn btn-ghost btn-sm" id="log-clear-btn">清空显示</button>
                        </div>
                        <div class="log-container" id="log-container">
                            <div class="log-empty">等待任务开始...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 设置弹窗 -->
        <div class="modal-overlay" id="settings-modal" style="display:none">
            <div class="modal glass-card">
                <div class="modal-header">
                    <h2>⚙️ 全局设置</h2>
                    <button class="btn btn-ghost btn-icon" id="settings-close-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h3>LLM 模型配置</h3>
                        <p class="settings-hint">Base URL 和 API Key 通过环境变量配置，此处选择模型 ID</p>
                        <div class="form-group">
                            <label for="answer-model-select">答题模型</label>
                            <div class="select-wrapper">
                                <select id="answer-model-select">
                                    <option value="">-- 加载中 --</option>
                                </select>
                                <button class="btn btn-ghost btn-icon" id="refresh-models-btn" title="刷新模型列表">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="captcha-model-select">验证码识别模型 <span class="tag">需支持图像输入</span></label>
                            <div class="select-wrapper">
                                <select id="captcha-model-select">
                                    <option value="">-- 不使用AI识别 --</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="settings-save-btn">保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/qrcode.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/task.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
